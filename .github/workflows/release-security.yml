name: release-security

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

jobs:
  release-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install cyclonedx-bom

      - name: Generate SBOM
        run: bash scripts/generate_sbom.sh mcp-firewall:ci

      - name: Ensure SBOM exists
        run: test -f dist/sbom.cdx.json

      - name: Verify attestation
        run: bash scripts/verify_attestation.sh mcp-firewall:ci
